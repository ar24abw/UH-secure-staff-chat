{% extends "base.html" %}

{% block content %}
    <h2>Staff Login</h2>

    <form method="POST" >
        <label>Username</label>
        <input type="text" name="username" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit">Log In</button>
    </form>
{% endblock %}
